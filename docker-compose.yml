services:
  postgres:
    image: postgres:16
    container_name: edu-portal-postgres
    environment:
      POSTGRES_DB: edu_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - edu_portal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edu_portal"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  edu_portal_pgdata:
